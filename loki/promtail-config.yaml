server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://127.0.0.1:3100/loki/api/v1/push

scrape_configs:
  - job_name: perlme-backend
    static_configs:
      - targets:
          - localhost
        labels:
          app: perlme-backend
          env: production
          __path__: /root/perlme/logs/backend.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            service: service
            requestId: requestId
            userId: userId
      - labels:
          level:
          service:
      - timestamp:
          source: time
          format: RFC3339Nano
