name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /root/perlme

            # Pull latest code
            git pull origin master

            cd backend

            # Install dependencies (pnpm, locked versions)
            pnpm install --frozen-lockfile

            # Compile TypeScript
            pnpm build

            # Run any new DB migrations against local Postgres
            node dist/drizzle/migrate.js

            # Zero-downtime reload (replaces old process before stopping it)
            pm2 reload ecosystem.config.js --env production

            # Wait for process to stabilise then health-check
            sleep 5
            curl --silent --fail http://127.0.0.1:4000/health \
              || { echo "Health check failed — dumping logs:"; pm2 logs perlme_api --lines 30 --nostream; exit 1; }

            echo "Deploy successful"
