# HTTP — redirect all traffic to HTTPS and handle Certbot ACME challenges
server {
    listen 80;
    listen [::]:80;
    server_name pearlmeinc.api.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS — main API server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pearlmeinc.api.com;

    # SSL — managed by Certbot (paths inserted automatically)
    ssl_certificate /etc/letsencrypt/live/pearlmeinc.api.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pearlmeinc.api.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "no-referrer" always;

    # Serve uploaded media directly from disk (bypass Node.js)
    location /uploads/ {
        alias /root/perlme/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Socket.IO — requires WebSocket upgrade pass-through
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # All other API traffic
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }
}
